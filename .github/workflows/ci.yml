name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  offline:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q runtime tests
      - run: python -m json.tool plugin.json >/dev/null
      - run: python -m json.tool .claude-plugin/plugin.json >/dev/null
      - run: python -m json.tool .mcp.json >/dev/null
      - run: python -m json.tool config/default.json >/dev/null
      - run: python -m json.tool schemas/config.schema.json >/dev/null
